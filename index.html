ntrierter Ruhe, in dem wir an dem arbeiten, was unter der Oberfl\xE4che liegt. Keine Show. Sondern pr\xE4zise Arbeit."},{q:"Eher f\xFCr private oder berufliche Themen?",a:"Beides. Manche kommen mit einem pers\xF6nlichen Thema, andere mit dem, was ihr Beruf mit ihnen macht \u2014 Druck, Entscheidungen, Verantwortung. Die Arbeit passt sich an, nicht du dich an sie."},{q:"Werden meine Angaben gespeichert?",a:"Was du in der App eingibst, bleibt auf deinem Ger\xE4t. Es gibt keine Anmeldung, und niemand liest mit. Erst wenn du dich selbst meldest, teilst du etwas von dir."}],bo=[{t:"Hypnose vs. Showhypnose",m:"2 Min",b:["Showhypnose ist Unterhaltung. Auf der B\xFChne werden gezielt Menschen ausgew\xE4hlt, die besonders schnell mitgehen \u2014 f\xFCr den Effekt.","Damit hat seri\xF6se Hypnose nichts zu tun.","In meiner Arbeit gibt es keinen Kontrollverlust. Du bleibst die ganze Zeit ansprechbar.","Keine Show. Pr\xE4zise Arbeit an dem, was dich h\xE4lt."]},{t:"Was passiert in einer Sitzung?",m:"3 Min",b:["Wir beginnen mit einem Gespr\xE4ch. Worum geht es? Was belastet dich?","Dann f\xFChre ich dich in einen Zustand fokussierter Entspannung. Das ist kein Schlaf \u2014 du bekommst alles mit.","Wir arbeiten an der emotionalen Ursache, nicht nur am Symptom.","Du steuerst den Prozess. Ich begleite ihn."]},{t:"Aufl\xF6sende vs. Suggestionshypnose",m:"3 Min",b:["Suggestionshypnose legt neue S\xE4tze \xFCber das alte Muster. \u201EDu bist ruhig.\u201C","Das kann kurzfristig wirken. Aber die emotionale Ladung darunter bleibt.","Aufl\xF6sende Hypnose l\xF6st die Ladung dort, wo sie entstanden ist. Nicht \xFCberschreiben. Aufl\xF6sen.","Das ist der Kern meiner Arbeit: Aufl\xF6sung vor Umsetzung."]},{t:"Wann Hypnose nicht hilft",m:"2 Min",b:["Hypnose ist keine Wunderpille. Und ich verspreche dir keine.","Sie wirkt nicht gegen deinen Willen. Wenn ein Teil von dir nicht ver\xE4ndern will, ist der Moment noch nicht da.","Bei akuten psychischen Erkrankungen ist \xE4rztliche oder psychotherapeutische Hilfe der richtige Weg \u2014 nicht ich.","Ehrlichkeit geh\xF6rt dazu."]},{t:"Was Resilienz wirklich ist",m:"3 Min",b:["Resilienz hei\xDFt nicht, alles wegzustecken. Nicht, h\xE4rter zu werden.","Es ist die F\xE4higkeit, nach Belastung wieder in Balance zu kommen.","Das ist trainierbar \u2014 \xFCber Haltung und \xFCber die F\xE4higkeit, dein Nervensystem zu regulieren.","Wer das kann, tr\xE4gt Verantwortung, ohne sich aufzureiben."]},{t:"M\xFCdigkeit ist nicht Ersch\xF6pfung",m:"2 Min",b:["M\xFCdigkeit ist ein Zustand. Ersch\xF6pfung ist eine Bilanz. Das eine kommt und geht. Das andere bleibt.","Ein Tagestief, zu wenig Bewegung, zu wenig Licht \u2014 das l\xE4sst sich kurz \xFCberbr\xFCcken. Bewegung, Atem, K\xE4lte, Tageslicht: keine Tricks, sondern echte Hebel. Sie sprechen dein Nervensystem und deinen Wach-Rhythmus an.","Ersch\xF6pfung ist etwas anderes. Sie bleibt, auch nach Schlaf und Pause. Da hilft kein Zwei-Minuten-Boost.","Faustregel: Tr\xE4gt dich ein kurzer Impuls wieder f\xFCr Stunden, war es M\xFCdigkeit. Bist du nach Ruhe immer noch leer \u2014 \xFCber Wochen \u2014 dann schau genauer hin.","Anhaltende Ersch\xF6pfung kann k\xF6rperliche Ursachen haben oder ein Zeichen von Dauerstress sein. Das geh\xF6rt \xE4rztlich abgekl\xE4rt, nicht weggeatmet. Ehrlichkeit geh\xF6rt dazu."]}],sc=[{c:"Angst & Anspannung",items:[{l:"\xC4ngste & Panik",k:"box"},{l:"Pr\xFCfungen, Auftritte & Lampenfieber",k:"box"},{l:"Innere Unruhe & schlechter Schlaf",k:"calm"}]},{c:"Antrieb & Selbst",items:[{l:"Selbstwert & innere Blockaden",k:"clarity"},{l:"Stress & Ersch\xF6pfung",k:"calm"}]},{c:"Gewohnheiten loslassen",items:[{l:"Rauchen",k:"urge"},{l:"Emotionales Essen",k:"halt"},{l:"Gewohnheiten ver\xE4ndern",k:"urge"}]},{c:"Beziehungen & Belastung",items:[{l:"Belastende Familie & Beziehungen",k:"clarity"}]}],ic={c:"Im Beruflichen",items:[{l:"Entscheidungen unter Druck",k:"decision"},{l:"Daueranspannung, kein Abschalten",k:"reset90"},{l:"Zweifel in der eigenen Rolle",k
